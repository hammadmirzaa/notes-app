name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      -uses: actions/checkout@v4

      -name: Setup Node.jobs
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      -name: Install Dependencies
        run: npm install

      -name: Build Frontend
        run: npm run build

  build-backend:
    runs-on: ubuntu-latest

    steps:
      -uses: actions/checkout@v4

      -name: Setup Node.jobs
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      -name: Install Dependencies
        run: npm install

      -name: Build Backend
        run: npm run build


  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        run: docker build -t notes-frontend ./frontend

      - name: Build Backend Docker Image
        run: docker build -t notes-backend ./backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Frontend Docker Image
        run: docker push notes-frontend

      - name: Push Backend Docker Image
        run: docker push notes-backend